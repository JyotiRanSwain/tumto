<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Tomato King</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      background: linear-gradient(135deg, #0a0f0d, #161e1a, #070a09);
      color:#fff;
      display:flex;
    }

    /* Full-Screen Video Background */
    .video-bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      overflow: hidden;
    }

    .video-bg-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, rgba(10, 15, 13, 0.88), rgba(22, 30, 26, 0.92));
      z-index: -1;
    }

    /* Ambient Glow Effects */
    .bg-glow{
      position:fixed;
      width:500px;
      height:500px;
      border-radius:50%;
      filter:blur(150px);
      opacity:.3;
      z-index:-1;
    }
    .bg-glow.one{
      background:#e63946;
      top:-100px;
      left:-100px;
    }
    .bg-glow.two{
      background:#ffb703;
      bottom:-150px;
      right:-150px;
    }

    /* Sidebar */
    .sidebar{
      position:fixed;
      left:25px;
      top:50%;
      transform:translateY(-50%);
      width:68px;
      padding:18px 0;
      border-radius:30px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      background:rgba(255, 255, 255, .03);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      border:1px solid rgba(255, 255, 255, .05);
      box-shadow:
        0 20px 60px rgba(0,0,0,.6),
        0 0 40px rgba(230, 57, 70, .08);
      z-index:999;
    }

    .logo{
      width:48px;
      height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      border-radius:50%;
      background:linear-gradient(135deg, #e63946, #ffb703);
      margin-bottom:15px;
      box-shadow:0 0 25px rgba(230, 57, 70, .4);
    }

    .sidebar a{
      width:48px;
      height:48px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      color:#e0e0e0;
      font-size:20px;
      border-radius:16px;
      transition:.4s;
      position:relative;
      overflow:hidden;
    }

    .sidebar a.active {
      background:rgba(230, 57, 70, .2);
      color:#ffb703;
      border: 1px solid rgba(255, 255, 255, .1);
    }

    .sidebar a::before{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(135deg, rgba(255,255,255,.2), transparent);
      transform:translateX(-100%);
      transition:.5s;
    }

    .sidebar a:hover::before{
      transform:translateX(100%);
    }

    .sidebar a:hover{
      background:rgba(230, 57, 70, .15);
      color:#ffb703;
      transform:scale(1.12);
      box-shadow:0 10px 30px rgba(230, 57, 70, .25);
    }

    /* Main Content */
    .main{
      margin-left:110px;
      width:100%;
      position:relative;
      z-index:1;
    }

    /* Top Navigation */
    .topbar{
      height:90px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 55px;
    }

    .nav-links{
      display:flex;
      gap:35px;
    }

    .nav-links a{
      color:#fff;
      text-decoration:none;
      font-weight:500;
      position:relative;
      transition: color .3s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #ffb703;
    }

    .nav-links a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:2px;
      background:#ffb703;
      transition:.3s;
    }

    .nav-links a:hover::after, .nav-links a.active::after{
      width:100%;
    }

    .buy-btn{
      padding:12px 26px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(10px);
      color:#fff;
      cursor:pointer;
      transition:.3s;
    }

    .buy-btn:hover{
      background:linear-gradient(135deg, #e63946, #ffb703);
      box-shadow:0 10px 30px rgba(230, 57, 70, .3);
      border-color: transparent;
    }

    /* Contact Container */
    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 50px;
      padding: 40px 70px 70px;
      align-items: center;
    }

    .contact-info h1 {
      font-size: 54px;
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.1;
    }

    .contact-info h1 span {
      background: linear-gradient(135deg, #e63946, #ffb703);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .contact-info p {
      color: #cccccc;
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 35px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .info-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #ffb703;
    }

    .info-details h4 {
      font-size: 14px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-details p {
      font-size: 16px;
      color: #fff;
      margin-bottom: 0;
    }

    /* Form Card */
    .contact-form-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #ffb703;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    .form-group input:focus, .form-group textarea:focus {
      border-color: #e63946;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(230, 57, 70, 0.15);
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e63946, #ffb703);
      color: white;
      border: none;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(230, 57, 70, 0.35);
    }

    @media(max-width:1024px){
      .contact-container {
        grid-template-columns: 1fr;
        padding: 40px 20px;
      }
    }

    @media(max-width:768px){
      body{
        flex-direction:column;
      }

      .sidebar{
        position:fixed;
        bottom:15px;
        top:auto;
        left:50%;
        transform:translateX(-50%);
        width:auto;
        height:74px;
        flex-direction:row;
        padding:0 15px;
        gap:8px;
      }

      .logo{
        display:none;
      }

      .main{
        margin-left:0;
        padding-bottom:100px;
      }

      .topbar{
        padding:20px;
      }

      .nav-links{
        display:none;
      }
    }
  </style>
</head>
<body>

  <div class="video-bg-container">
    <video src="videos/sauce-banner.mp4" autoplay loop muted playsinline poster="images/sauce-poster.svg">
      Your browser does not support the video tag.
    </video>
  </div>
  <div class="video-overlay"></div>

  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <aside class="sidebar">
    <div class="logo">🍅</div>
    <a href="index.html"><i class="fa-solid fa-house"></i></a>
    <a href="products.html"><i class="fa-solid fa-store"></i></a>
    <a href="recipes.html"><i class="fa-solid fa-bowl-food"></i></a>
    <a href="about.html"><i class="fa-solid fa-book-open"></i></a>
    <a href="contact.html" class="active"><i class="fa-solid fa-phone"></i></a>
  </aside>

  <main class="main">
    <header class="topbar">
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="recipes.html">Recipes</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <button class="buy-btn">Buy Now</button>
    </header>

    <section class="contact-container">
      <div class="contact-info">
        <h1>Get In <span>Touch</span></h1>
        <p>Have some ideas, partnerships in mind, or questions about bulk sourcing? Drop us a line—we would love to collaborate.</p>
        
        <div class="info-item">
          <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
          <div class="info-details">
            <h4>Email Us</h4>
            <p>hello@tomatoking.in</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
          <div class="info-details">
            <h4>Headquarters</h4>
            <p>Odisha, India</p>
          </div>
        </div>
      </div>

      <div class="contact-form-card">
        <form action="#" method="POST">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="E.g., Ranjan Swain" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@domain.com" required />
          </div>
          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" rows="4" placeholder="How can we help you?" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
